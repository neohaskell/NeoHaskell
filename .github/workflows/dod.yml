# Definition-of-done gate (pipeline Phase 6, task 1) — POST-MERGE, NOTIFY-ONLY.
#
# The suites already run on push-to-main (Test.yml). This watches their result:
# if `Test` fails on `main` — a merged change is NOT green at its declared levels
# — the merge is flagged as a **revert-candidate** and a notification is posted.
# It NEVER auto-reverts (ADR-0068); the kill switch (`/revert`, revert.yml) is a
# separate, deliberate maintainer action.
name: dod

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  flag:
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Flag the merge as a revert-candidate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail
          # squash-merge commit subjects end with "(#NNN)"
          MSG=$(gh api "repos/${REPO}/commits/${SHA}" -q '.commit.message' | head -1)
          NUM=$(printf '%s' "$MSG" | grep -oE '#[0-9]+' | tail -1 | tr -d '#' || true)
          BODY=$(printf '%s' "⚠️ **DoD gate**: the \`Test\` suite failed on \`main\` after this merged (\`${SHA}\`) — the change is not green at its declared levels. Marked **revert-candidate**. Verify the criteria, or trigger the kill switch by commenting \`/revert\`. Notify-only — nothing was reverted. Run: ${RUN_URL}")
          if [ -n "${NUM}" ]; then
            gh pr edit "${NUM}" --add-label revert-candidate || echo "note: create the 'revert-candidate' label to enable auto-labelling"
            gh pr comment "${NUM}" --body "${BODY}"
          else
            gh issue create --title "DoD gate failed on main (${SHA})" --body "${BODY}"
          fi
