name: "Test"

on:
  pull_request:
    branches:
      - main
    # ready_for_review is NOT a default activity type — without it, flipping
    # a draft to ready would never re-trigger the suite the guard skipped
    types: [opened, synchronize, reopened, ready_for_review]
    # NB: no workflow-level `paths:` on pull_request. A REQUIRED check must always
    # report — a path-filtered workflow that never runs leaves its check pending
    # forever and blocks tooling-only PRs. Path gating moves to the `changes` job
    # below: heavy jobs SKIP when nothing compiled changed, and `ci-gate` (always
    # runs) accepts those skips, so it is a sound required check.
  push:
    branches:
      - main
    paths:
      - "core/**"
      - "testbed/**"
      - "integrations/**"
      - "nix/**"
      - ".github/workflows/**"

permissions:
  id-token: write
  contents: read

jobs:
  # DRAFT-PR CI GUARD (pipeline Phase 5, task 3): a draft PR is a parked spec
  # awaiting the maintainer's gate decision — burning ~1h of build+test on it
  # is waste. The heavy jobs skip on drafts (dependents skip transitively);
  # ci-gate accepts the skips only while the PR stays a draft. Marking the PR
  # ready-for-review re-triggers the full matrix. checks.yml (doctor, codemap,
  # lint, spec) still runs on drafts — seconds, and it is what validates the
  # spec itself.
  # Path gating at the JOB level (not the workflow level — see the note under
  # `on:`). `compiled` is true when a PR touches anything that can change a
  # build/test outcome; on push it is always true (the push paths filter already
  # ensured that). Cheap (~15s) so it can run on every PR.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      compiled: ${{ steps.detect.outputs.compiled }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: detect
        env:
          EVENT: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "push" ]; then
            echo "compiled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PATTERN='^(core/|testbed/|integrations/|nix/|\.github/workflows/|cabal\.project|flake\.nix|flake\.lock)'
          if git diff --name-only "origin/${BASE_REF}...HEAD" | grep -qE "$PATTERN"; then
            echo "compiled=true" >> "$GITHUB_OUTPUT"
          else
            echo "compiled=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: changes
    if: >-
      (github.event_name == 'push' || github.event.pull_request.draft == false)
      && needs.changes.outputs.compiled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: DeterminateSystems/determinate-nix-action@v3.21.5
        with:
          extra-conf: |
            accept-flake-config = true
            extra-substituters = https://cache.iog.io https://neohaskell.cachix.org
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= neohaskell.cachix.org-1:mo2cLaGbwqbrxs9xhqKK8jeNsn3osi7t6XoAmxSZssc=
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - uses: actions/cache@v6
        with:
          path: dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('**/*.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-
      - name: Build the project with cabal
        run: nix develop --command cabal build all --disable-documentation
      - uses: actions/upload-artifact@v7
        with:
          name: dist-newstyle
          path: dist-newstyle
          compression-level: 0
          retention-days: 1
          if-no-files-found: error

  codemap-sync:
    # Runs in PARALLEL with the test suites (needs only build's artifact) so it
    # adds no wall-clock, and is ENFORCED as a merge gate via ci-gate below — a
    # separate runner, so parallelism is free. (If a test fails the regen was
    # spent for nothing, but that costs a runner-minute, not PR latency.)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@v3.21.5
        with:
          extra-conf: |
            accept-flake-config = true
            extra-substituters = https://cache.iog.io https://neohaskell.cachix.org
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= neohaskell.cachix.org-1:mo2cLaGbwqbrxs9xhqKK8jeNsn3osi7t6XoAmxSZssc=
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - uses: actions/download-artifact@v8
        with:
          name: dist-newstyle
          path: dist-newstyle
      # Hackage hoogle txts for the ./dev api vanilla DB (dep-closure mined;
      # see ADR-0066) — cached so the fetch is a no-op on warm runs.
      - uses: actions/cache@v6
        with:
          path: .hoogle-vanilla-src
          key: ${{ runner.os }}-hoogle-vanilla-${{ hashFiles('flake.lock', '**/*.cabal') }}
          restore-keys: |
            ${{ runner.os }}-hoogle-vanilla-
      - name: Regenerate codemap + build/smoke-check hoogle DBs (canary — same flow as local ./dev codemap)
        run: CODEMAP_PROJECT=cabal.project ./dev codemap
      - name: Sync check — committed codemap must match regenerated
        run: |
          git diff --exit-code codemap/ || {
            echo "::error::codemap out of sync with the code — run ./dev codemap and commit the result"
            exit 1
          }

  # Doctest gate (pipeline Phase 4): the examples on codemap/api-hot.md and
  # codemap/phrasebook.md are mined from source doctests — THIS job is what
  # makes their "doctest-gated" claim true. Runner: scripts/run-doctest
  # (build-free: doctest interprets sources against the dev-shell GHC's
  # package DB, so no dist-newstyle artifact is needed).
  doctest:
    needs: changes
    if: >-
      (github.event_name == 'push' || github.event.pull_request.draft == false)
      && needs.changes.outputs.compiled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: DeterminateSystems/determinate-nix-action@v3.21.5
        with:
          extra-conf: |
            accept-flake-config = true
            extra-substituters = https://cache.iog.io https://neohaskell.cachix.org
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= neohaskell.cachix.org-1:mo2cLaGbwqbrxs9xhqKK8jeNsn3osi7t6XoAmxSZssc=
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Run doctest suite
        run: ./dev doctest

  test-core:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: DeterminateSystems/determinate-nix-action@v3.21.5
        with:
          extra-conf: |
            accept-flake-config = true
            extra-substituters = https://cache.iog.io https://neohaskell.cachix.org
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= neohaskell.cachix.org-1:mo2cLaGbwqbrxs9xhqKK8jeNsn3osi7t6XoAmxSZssc=
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - uses: actions/download-artifact@v8
        with:
          name: dist-newstyle
          path: dist-newstyle
      - name: Run nhcore-test-core
        run: LOG_LEVEL=Warn nix develop --command cabal test nhcore-test-core

  test-auth:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: DeterminateSystems/determinate-nix-action@v3.21.5
        with:
          extra-conf: |
            accept-flake-config = true
            extra-substituters = https://cache.iog.io https://neohaskell.cachix.org
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= neohaskell.cachix.org-1:mo2cLaGbwqbrxs9xhqKK8jeNsn3osi7t6XoAmxSZssc=
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - uses: actions/download-artifact@v8
        with:
          name: dist-newstyle
          path: dist-newstyle
      - name: Run nhcore-test-auth
        run: LOG_LEVEL=Warn nix develop --command cabal test nhcore-test-auth

  test-integration:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: DeterminateSystems/determinate-nix-action@v3.21.5
        with:
          extra-conf: |
            accept-flake-config = true
            extra-substituters = https://cache.iog.io https://neohaskell.cachix.org
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= neohaskell.cachix.org-1:mo2cLaGbwqbrxs9xhqKK8jeNsn3osi7t6XoAmxSZssc=
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - uses: actions/download-artifact@v8
        with:
          name: dist-newstyle
          path: dist-newstyle
      - name: Run nhcore-test-integration
        run: LOG_LEVEL=Warn nix develop --command cabal test nhcore-test-integration

  test-service:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: DeterminateSystems/determinate-nix-action@v3.21.5
        with:
          extra-conf: |
            accept-flake-config = true
            extra-substituters = https://cache.iog.io https://neohaskell.cachix.org
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= neohaskell.cachix.org-1:mo2cLaGbwqbrxs9xhqKK8jeNsn3osi7t6XoAmxSZssc=
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - uses: actions/download-artifact@v8
        with:
          name: dist-newstyle
          path: dist-newstyle
      - name: Start PostgreSQL
        run: |
          docker run -d --name neohaskell_postgres \
            -e POSTGRES_USER=neohaskell \
            -e POSTGRES_PASSWORD=neohaskell \
            -e POSTGRES_DB=neohaskell \
            -p 5432:5432 \
            postgres:16-alpine \
            postgres -c max_connections=200
          for i in $(seq 1 30); do
            pg_isready -h 127.0.0.1 -U neohaskell && break || sleep 1
          done
          if ! pg_isready -h 127.0.0.1 -U neohaskell; then
            echo "::error::PostgreSQL failed to start within 30 seconds"
            exit 1
          fi
        env:
          PGPASSWORD: neohaskell
      - name: Run nhcore-test-service
        run: LOG_LEVEL=Warn nix develop --command cabal test nhcore-test-service

  test-hurl:
    needs: [build]
    runs-on: ubuntu-latest
    # 40m: the dev-shell entry pulls HLS / fourmolu / hlint / ormolu /
    # stylish-haskell / floskell on cold magic-nix-cache, and the post-job
    # cache upload step pushes those same paths back to GHA cache (~12m).
    # Tests themselves run in ~8.5m, dev-shell pull ~5m, post-cache upload
    # ~12m worst case. 40m absorbs the cold-cache one-time cost; warm-cache
    # runs finish in ~10m total.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: DeterminateSystems/determinate-nix-action@v3.21.5
        with:
          extra-conf: |
            accept-flake-config = true
            extra-substituters = https://cache.iog.io https://neohaskell.cachix.org
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= neohaskell.cachix.org-1:mo2cLaGbwqbrxs9xhqKK8jeNsn3osi7t6XoAmxSZssc=
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - uses: actions/download-artifact@v8
        with:
          name: dist-newstyle
          path: dist-newstyle
      - name: Restore executable permissions
        run: find dist-newstyle/build -type f -name 'nhtestbed' -exec chmod +x {} +
      - name: Start PostgreSQL
        run: |
          docker run -d --name neohaskell_postgres \
            -e POSTGRES_USER=neohaskell \
            -e POSTGRES_PASSWORD=neohaskell \
            -e POSTGRES_DB=neohaskell \
            -p 5432:5432 \
            postgres:16-alpine \
            postgres -c max_connections=200
          for i in $(seq 1 30); do
            pg_isready -h 127.0.0.1 -U neohaskell && break || sleep 1
          done
          if ! pg_isready -h 127.0.0.1 -U neohaskell; then
            echo "::error::PostgreSQL failed to start within 30 seconds"
            exit 1
          fi
        env:
          PGPASSWORD: neohaskell
      - name: Install hurl
        run: |
          curl -LO https://github.com/Orange-OpenSource/hurl/releases/download/6.0.0/hurl_6.0.0_amd64.deb
          sudo dpkg -i hurl_6.0.0_amd64.deb
      - name: Install poppler-utils (for PDF extraction tests)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Run integration tests
        run: nix develop --command ./testbed/scripts/run-tests.sh

  # THE REQUIRED CHECK. `if: always()` + no workflow paths filter ⇒ this always
  # runs and reports a real conclusion on every PR, so it is safe to require in
  # branch protection (unlike the individual, path-skipped jobs). It enforces
  # "the project compiles AND tests pass" whenever there is a compiled surface to
  # check, and passes cleanly when there is nothing to check.
  ci-gate:
    if: always()
    needs: [changes, build, doctest, test-core, test-auth, test-integration, test-service, test-hurl, codemap-sync]
    runs-on: ubuntu-latest
    steps:
      - name: Check all tests passed
        env:
          IS_DRAFT: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft }}
          COMPILED: ${{ needs.changes.outputs.compiled }}
          CHANGES_RESULT: ${{ needs.changes.result }}
        run: |
          # Fail closed if path-detection itself failed — otherwise a compiled PR
          # could skip everything and pass on a bad `compiled` reading.
          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "::error::changes-detection job did not succeed ($CHANGES_RESULT)"
            exit 1
          fi
          # Skips are acceptable ONLY when there is genuinely nothing to test: a
          # draft PR (parked spec) or a PR that changed no compiled surface.
          # Otherwise every build/test job must be success.
          allow_skip=false
          if [[ "$IS_DRAFT" == "true" || "$COMPILED" != "true" ]]; then
            allow_skip=true
          fi
          # codemap-sync runs in parallel; listed last so a test failure is the
          # first error reported when several jobs fail together.
          results=(
            "build=${{ needs.build.result }}"
            "doctest=${{ needs.doctest.result }}"
            "test-core=${{ needs.test-core.result }}"
            "test-auth=${{ needs.test-auth.result }}"
            "test-integration=${{ needs.test-integration.result }}"
            "test-service=${{ needs.test-service.result }}"
            "test-hurl=${{ needs.test-hurl.result }}"
            "codemap-sync=${{ needs.codemap-sync.result }}"
          )
          for entry in "${results[@]}"; do
            job="${entry%%=*}"; r="${entry#*=}"
            if [[ "$r" == "skipped" && "$allow_skip" == "true" ]]; then
              continue
            fi
            if [[ "$r" != "success" ]]; then
              echo "::error::$job did not pass (result: $r)"
              exit 1
            fi
          done
          echo "ci-gate: all build/test jobs passed (or correctly skipped — nothing to test)"
